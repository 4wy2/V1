<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>منصة جداول الاختبارات | نادي الهندسة الكهربائية</title>

    <link rel="icon" href="https://img.icons8.com/ios-filled/50/8042ff/lightning-bolt.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/plugin/customParseFormat.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/locale/ar.min.js"></script>

    <style>
    :root { 
        --primary: #8042ff; --accent: #1fc47c; --danger: #ff4d6d; --warning: #ff9f43;
        --ee-cyan: #48ffe8; --bg: #050816; --glass-bg: rgba(13, 23, 56, 0.4);
        --row-bg: rgba(255, 255, 255, 0.02); --border-color: rgba(255, 255, 255, 0.08);
        --text-dim: rgba(255, 255, 255, 0.4);
    }
    
    body { margin: 0; background: var(--bg); font-family: 'Tajawal', sans-serif; color: white; direction: rtl; }

    /* حاوية التطبيق */
    .app { width: min(950px, 96%); margin: 40px auto; background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--border-color); border-radius: 28px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.7); }

    /* التبويبات */
    .tabs-container { display: flex; justify-content: center; gap: 10px; padding: 0 20px 20px; border-bottom: 1px solid var(--border-color); }
    .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-dim); padding: 12px 25px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-family: inherit; }
    .tab-btn.active { background: linear-gradient(135deg, rgba(128, 66, 255, 0.2), rgba(31, 196, 124, 0.2)); border-color: var(--primary); color: white; }
    .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
    .tab-content.active { display: block; }

    /* منطقة البحث */
    .id-search-area { display: flex; gap: 10px; max-width: 450px; margin: 30px auto; padding: 0 15px; }
    .id-search-area input { flex: 1; padding: 14px; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.05); color: white; text-align: center; font-weight: 800; font-size: 16px; outline: none; }
    .id-search-area button { background: linear-gradient(135deg, var(--ee-cyan), #2f7bff); color: #050816; border: none; padding: 0 25px; border-radius: 16px; font-weight: 900; cursor: pointer; font-family: inherit; }

    /* نظام الجدول (Grid) */
    .table-header, .row { display: grid; gap: 12px; align-items: center; padding: 15px 25px; margin: 8px 15px; }
    
    /* تقسيم الشاشات الكبيرة للآيدي (5 أعمدة) */
    .id-grid .table-header, .id-grid .row { grid-template-columns: 1.5fr 110px 110px 80px 100px !important; }

    .table-header { background: rgba(255,255,255,0.03); border-radius: 12px; font-size: 11px; color: var(--text-dim); font-weight: 800; text-align: center; }
    .row { background: var(--row-bg); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
    .row:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }

    /* تفاصيل الصف */
    .exam-info { text-align: right !important; }
    .exam-info .label { color: #ffd166; font-size: 15px; font-weight: 900; display: block; }
    .exam-date-text b { display: block; font-size: 11px; }
    .exam-date-text small { font-size: 8px; color: var(--accent); font-weight: 800; }
    .exam-time-inner { background: rgba(255,255,255,0.03); padding: 5px; border-radius: 8px; font-size: 10px; text-align: center; }
    .exam-venue { color: var(--ee-cyan); font-weight: 900; font-size: 12px; text-align: center; }

    /* 📱 تنسيق الجوال (حل مشكلة الانضغاط) */
    @media (max-width: 600px) {
        .app { margin: 0; border-radius: 0; width: 100%; }
        .id-grid .table-header, .id-grid .row { 
            grid-template-columns: 1.3fr 60px 60px 40px 55px !important; /* توزيع أذكى للمساحة */
            padding: 10px 5px; 
            margin: 5px 0;
            gap: 4px;
        }
        .table-header { font-size: 8px; }
        .exam-info .label { font-size: 11px !important; }
        .exam-date-text b { font-size: 9px; }
        .exam-time-inner { font-size: 8px; padding: 2px; }
        .exam-venue { font-size: 9px !important; line-height: 1.1; }
        .exam-duration span { font-size: 8px !important; display: block; }
    }

    /* الـ Pop-up */
    .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 2000; display: none; justify-content: center; align-items: center; }
    .popup-content { background: #0d1738; border: 1px solid var(--ee-cyan); border-radius: 28px; padding: 30px; text-align: center; max-width: 400px; }
    
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 12px 25px; border-radius: 50px; font-weight: 800; opacity: 0; transition: 0.3s; z-index: 3000; }
    .toast.show { opacity: 1; }
    
    .empty-state { padding: 60px 20px; text-align: center; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="popup-overlay" id="takeoverPopup">
        <div class="popup-content">
            <i class="fa-solid fa-id-card" style="font-size: 50px; color: var(--ee-cyan); margin-bottom: 15px;"></i>
            <h2 style="margin: 0 0 10px;">استخدم الرقم الأكاديمي!</h2>
            <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 25px;">وفر مجهودك وابحث برقمك الجامعي لجلب جدولك الرسمي فوراً.</p>
            <button class="btn-primary-glow" onclick="switchToIdMode()" style="width: 100%; padding: 15px; border-radius: 12px; background: var(--ee-cyan); border: none; font-weight: 900; cursor: pointer;">جلب جدولي الآن</button>
            <button onclick="closePopup()" style="background: none; border: none; color: var(--text-dim); margin-top: 15px; cursor: pointer; text-decoration: underline;">إغلاق</button>
        </div>
    </div>

    <main class="app">
        <div style="text-align: center; padding: 30px;">
            <i class="fa-solid fa-bolt-lightning" style="color: var(--primary); font-size: 35px;"></i>
            <h2 id="dynamicMainTitle" style="margin-top: 10px;">منصة جداول الاختبارات</h2>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('manualSearch')">بناء يدوي</button>
            <button class="tab-btn" onclick="switchTab('idSearch')">بالرقم الأكاديمي</button>
        </div>

        <div id="idSearchMode" class="tab-content">
            <div class="id-search-area">
                <input id="studentIdInput" type="text" inputmode="numeric" placeholder="أدخل الرقم الجامعي...">
                <button onclick="doIdSearch()">بحث</button>
            </div>

            <div class="id-grid">
                <div class="table-header" id="idTableHeader" style="display:none;">
                    <div>المادة</div><div>التاريخ</div><div>الوقت</div><div>المدة</div><div>القاعة</div>
                </div>
                <div id="idResultsArea">
                    <div class="empty-state">أدخل رقمك الأكاديمي لعرض الجدول الرسمي</div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastMessage" class="toast"></div>

    <script>
        const ID_API_BASE = "https://eec.mohammed-rasasi.workers.dev";

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tab + 'Mode').classList.add('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toastMessage');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function formatDuration(raw) {
            if (!raw) return "";
            const h = raw.match(/(\d+)\s*H/i); const m = raw.match(/(\d+)\s*M/i);
            let res = [];
            if (h) res.push(`${h[1]}س`); if (m) res.push(`${m[1]}د`);
            return res.join(' ');
        }

        async function doIdSearch() {
            const id = document.getElementById('studentIdInput').value.trim();
            const area = document.getElementById('idResultsArea');
            const header = document.getElementById('idTableHeader');

            if (!id) return showToast('أدخل الرقم أولاً');

            area.innerHTML = '<div class="empty-state">جاري التحميل...</div>';

            try {
                const res = await fetch(`${ID_API_BASE}/exams?studentId=${id}`);
                const data = await res.json();
                const records = data.records || [];

                if (records.length === 0) {
                    area.innerHTML = '<div class="empty-state">لا يوجد بيانات لهذا الرقم</div>';
                    return;
                }

                header.style.display = 'grid';
                area.innerHTML = '';

                records.forEach(r => {
                    const row = document.createElement('div');
                    row.className = 'row';
                    
                    // استخراج الوقت
                    const time = r.timeStr.split('-');
                    
                    row.innerHTML = `
                        <div class="exam-info"><span class="label">${r.courseCode}</span></div>
                        <div class="exam-date">
                            <div class="exam-date-text">
                                <b>${r.dateStr.split(' ')[0]}</b>
                                <small>اختبار رسمي</small>
                            </div>
                        </div>
                        <div class="exam-time">
                            <div class="exam-time-inner">
                                <div>${time[0]}</div>
                                <div style="opacity:0.5; font-size:8px;">${time[1] || ''}</div>
                            </div>
                        </div>
                        <div class="exam-duration">
                            <span>${formatDuration(r.duration)}</span>
                        </div>
                        <div class="exam-venue">${r.venue || '-'}</div>
                    `;
                    area.appendChild(row);
                });
            } catch (e) {
                area.innerHTML = '<div class="empty-state">خطأ في الاتصال</div>';
            }
        }

        function closePopup() { document.getElementById('takeoverPopup').style.display = 'none'; }
        function switchToIdMode() { closePopup(); switchTab('idSearch'); }
        
        // إظهار البوب أب عند أول دخول
        if(!localStorage.getItem('popup_seen')) {
            setTimeout(() => {
                document.getElementById('takeoverPopup').style.display = 'flex';
                localStorage.setItem('popup_seen', 'true');
            }, 1000);
        }
    </script>
</body>
</html>
